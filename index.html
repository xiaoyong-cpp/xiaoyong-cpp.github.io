<!DOCTYPE html>
<html>
<head>
    <title>中英文切换示例</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="body">
    <div class="container">
        <div>
            <button onclick="switchLanguage('zh')">中文</button>
            <button onclick="switchLanguage('en')">English</button>
        </div>
        
        <h1 id="title">欢迎来到我的网站</h1>
        <p id="description">这是一个多语言示例</p>
        <button id="action-btn" class="button">点击我</button>
    </div>

    <script src="language_support.js"></script>
</body>
</html>
